services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: budget-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: budget-me-api-gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  analytics-engine:
    build:
      context: .
      dockerfile: apps/analytics-engine/Dockerfile
    container_name: budget-me-analytics-engine
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: budget-me-dashboard
    ports:
      - "5173:80"
    depends_on:
      - api-gateway